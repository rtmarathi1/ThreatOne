name: Build ThreatOne

# Builds ThreatOne Enterprise on Windows and Linux and uploads the compiled
# binaries as downloadable artifacts.
#
# After a run completes, download the ".exe" from:
#   GitHub repo -> Actions tab -> select the workflow run -> Artifacts section
#
# The full compiler output is also uploaded as a "*-build-log" artifact so any
# build errors can be inspected without re-running.

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  # ---------------------------------------------------------------------------
  # Windows build (produces threatone.exe)
  # ---------------------------------------------------------------------------
  build-windows:
    name: Build Windows (MSVC)
    runs-on: windows-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Configure (CMake + Visual Studio 2022)
        run: cmake -B build -G "Visual Studio 17 2022" -A x64 -DENABLE_QT=OFF

      - name: Build (Release)
        id: build
        continue-on-error: true
        shell: pwsh
        run: |
          cmake --build build --config Release 2>&1 | Tee-Object -FilePath build_output.log
          exit $LASTEXITCODE

      - name: Show build errors (if any)
        if: always()
        shell: pwsh
        run: |
          Write-Host "===== Lines containing 'error' ====="
          Select-String -Path build_output.log -Pattern "error C","error LNK","error MSB",": error" |
            ForEach-Object { $_.Line } | Select-Object -First 80

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: windows-build-log
          path: build_output.log
          if-no-files-found: warn

      - name: Run tests (non-blocking)
        if: always()
        continue-on-error: true
        working-directory: build
        run: ctest --output-on-failure -C Release

      - name: Stage executable
        if: always()
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          $exe = Get-ChildItem -Recurse build -Filter "threatone.exe" -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($null -eq $exe) {
            Write-Warning "threatone.exe was not produced (build likely failed). Check the windows-build-log artifact."
          } else {
            Copy-Item $exe.FullName -Destination dist\threatone.exe
            Write-Host "Staged: $($exe.FullName)"
          }

      - name: Upload Windows executable
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: threatone-windows-x64
          path: dist/threatone.exe
          if-no-files-found: warn

  # ---------------------------------------------------------------------------
  # Linux build (produces threatone ELF binary)
  # ---------------------------------------------------------------------------
  build-linux:
    name: Build Linux (GCC)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Configure (CMake)
        run: cmake -B build -DENABLE_QT=OFF -DCMAKE_BUILD_TYPE=Release

      - name: Build
        id: build
        continue-on-error: true
        run: cmake --build build -j$(nproc) 2>&1 | tee build_output.log

      - name: Show build errors (if any)
        if: always()
        run: |
          echo "===== Lines containing 'error:' ====="
          grep -E "error:|Error" build_output.log | head -80 || echo "No compiler 'error:' lines found (failure may be in tests)."

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: linux-build-log
          path: build_output.log
          if-no-files-found: warn

      - name: Run tests (non-blocking)
        if: always()
        continue-on-error: true
        working-directory: build
        run: ctest --output-on-failure

      - name: Stage binary
        if: always()
        run: |
          mkdir -p dist
          if [ -f build/bin/threatone ]; then
            cp build/bin/threatone dist/threatone
            echo "Staged build/bin/threatone"
          else
            echo "::warning::threatone binary not produced (build likely failed). Check the linux-build-log artifact."
          fi

      - name: Upload Linux binary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: threatone-linux-x64
          path: dist/threatone
          if-no-files-found: warn
